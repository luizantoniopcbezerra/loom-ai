spring.application.name=loomai-backend
logging.file.name=logs/app.log
server.port=8080
loom.db.path=${LOOM_DB_PATH:loomai.db}
spring.datasource.url=jdbc:sqlite:${loom.db.path}?journal_mode=WAL&busy_timeout=5000
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.hikari.maximum-pool-size=1
spring.sql.init.mode=always
spring.sql.init.encoding=UTF-8
spring.jackson.serialization.write-dates-as-timestamps=false
loom.llm.chat-url=${LOOM_LLM_CHAT_URL:}
loom.llm.api-key=${LOOM_LLM_API_KEY:}
loom.llm.model=${LOOM_LLM_MODEL:}
