<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loom — Your local AI command center</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  /* Pure black — Paperclip-style brutalism */
  --bg:#000000;
  --surface:#0a0a0a;
  --surface-2:#111111;
  --surface-3:#181818;
  --border:#1a1a1a;
  --border-2:#2a2a2a;
  --text:#ededed;
  --text-2:#737373;
  --text-3:#404040;
  /* Deep cyan primary — vibrant but not glaring */
  --blue:#00b8d4;
  --blue-dim:rgba(0,184,212,0.10);
  --blue-glow:rgba(0,184,212,0.25);
  /* Muted magenta secondary */
  --purple:#d9357a;
  --purple-dim:rgba(217,53,122,0.10);
  /* Deeper mint */
  --green:#00cc88;
  --green-dim:rgba(0,204,136,0.12);
  /* Toned yellow */
  --amber:#e6c128;
  --red:#d93346;
  --font:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
  --mono:'JetBrains Mono',monospace;
  /* Sharper edges throughout */
  --r:3px;--r-lg:4px;--r-xl:6px;
  --sidebar-w:208px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);overflow:hidden;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}
#root{height:100vh;display:flex;flex-direction:column;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border-2);}
::-webkit-scrollbar-thumb:hover{background:#3a3a3a;}
button{font-family:var(--font);cursor:pointer;}
input,textarea{font-family:var(--font);}
/* Uppercase mono labels everywhere */
.mono-tag{font-family:var(--mono);font-size:10.5px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-2);}
/* Selection */
::selection{background:var(--blue);color:#000;}

/* ── animations ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
@keyframes slideRight{from{opacity:0;transform:translateX(-10px);}to{opacity:1;transform:translateX(0);}}
@keyframes scanLine{0%{left:-50%;}100%{left:150%;}}
@keyframes statusGlow{0%,100%{box-shadow:0 0 0 0 rgba(0,204,136,0.5);}50%{box-shadow:0 0 0 5px rgba(0,204,136,0);}}
@keyframes statusGlowBlue{0%,100%{box-shadow:0 0 0 0 rgba(0,184,212,0.5);}50%{box-shadow:0 0 0 5px rgba(0,184,212,0);}}
@keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
@keyframes blink{0%,49%{opacity:1;}50%,100%{opacity:0;}}
@keyframes gradientFlow{0%,100%{background-position:0% 50%;}50%{background-position:100% 50%;}}
@keyframes nodeActive{0%,100%{filter:drop-shadow(0 0 0px transparent);}50%{filter:drop-shadow(0 0 8px rgba(0,184,212,0.6));}}
@keyframes streamDot1{0%,100%{opacity:0.2;}33%{opacity:1;}}
@keyframes streamDot2{0%,100%{opacity:0.2;}66%{opacity:1;}}
@keyframes streamDot3{0%,100%{opacity:0.2;}99%{opacity:1;}}
@keyframes countIn{from{opacity:0;transform:scale(0.85);}to{opacity:1;transform:scale(1);}}
@keyframes progress{from{width:0%;}to{width:100%;}}
@keyframes connFlow{0%{stroke-dashoffset:200;}100%{stroke-dashoffset:0;}}
@keyframes agentDetect{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
@keyframes cyanPulse{0%,100%{box-shadow:0 0 0 0 rgba(0,184,212,0.4);}50%{box-shadow:0 0 12px 2px rgba(0,184,212,0.6);}}
</style>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="forge-icons.jsx"></script>
<script type="text/babel" src="forge-onboarding.jsx"></script>
<script type="text/babel" src="forge-workspace.jsx"></script>
<script type="text/babel" src="forge-agents.jsx"></script>
<script type="text/babel" src="forge-workflow.jsx"></script>
<script type="text/babel" src="forge-terminal.jsx"></script>
<script type="text/babel" src="forge-settings.jsx"></script>
<script type="text/babel" src="forge-marketplace.jsx"></script>
<script type="text/babel" src="forge-models.jsx"></script>
<script type="text/babel" src="forge-multiagent.jsx"></script>
<script type="text/babel" src="forge-palette.jsx"></script>
<script type="text/babel" src="forge-profile.jsx"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">



const { useState: useAppState, useEffect: useAppEffect } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentColor": "#00b8d4",
  "sidebarExpanded": true
} /*EDITMODE-END*/;

const NAV_ITEMS = [
{ id: 'workspace', icon: 'chat', label: 'Chats', group: 'main' },
{ id: 'agents', icon: 'agent', label: 'Agents', group: 'main' },
{ id: 'workflow', icon: 'workflow', label: 'Workflows', group: 'main' },
{ id: 'terminal', icon: 'terminal', label: 'Terminal', group: 'main' },
{ id: 'multiagent', icon: 'users', label: 'Multi-Agent', group: 'main' }];


function AppTitleBar({ onPalette }) {
  return (
    <div style={{ height: 'var(--titlebar-h)', background: 'var(--surface)', borderBottom: '1px solid var(--border)', display: 'flex', alignItems: 'center', padding: '0 16px', flexShrink: 0, userSelect: 'none' }}>
      <div style={{ display: 'flex', gap: 6, marginRight: 16 }}>
        {['#ff5f57', '#febc2e', '#28c840'].map((c, i) =>
        <div key={i} style={{ width: 12, height: 12, borderRadius: '50%', background: c }} />
        )}
      </div>
      <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
        <ForgeLogo size={18} />
        <span style={{ fontSize: 13, fontWeight: 700, letterSpacing: '-0.01em', background: 'linear-gradient(90deg, var(--text) 40%, var(--text-2))', WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent' }}>Loom</span>
      </div>
      <div style={{ flex: 1 }} />
      <button onClick={onPalette} style={{ display: 'flex', alignItems: 'center', gap: 7, padding: '5px 12px', background: 'var(--surface-2)', border: '1px solid var(--border)', borderRadius: 7, cursor: 'pointer', color: 'var(--text-3)', fontSize: 12, transition: 'all 0.15s' }}>
        <Icon name="search" size={13} />
        <span>Search or jump to…</span>
        <span style={{ padding: '1px 6px', background: 'var(--surface-3)', border: '1px solid var(--border-2)', borderRadius: 4, fontSize: 10, fontFamily: 'var(--font)' }}>⌘K</span>
      </button>
      <div style={{ display: 'flex', gap: 4, marginLeft: 14 }}>
        <button style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'var(--text-3)', padding: 5, display: 'flex' }}><Icon name="maximize" size={13} /></button>
      </div>
    </div>);

}

function AppSidebar({ screen, onScreen, onPalette, expanded, onToggle, theme, onToggleTheme, user, onOpenProfile }) {
  const main = NAV_ITEMS.filter((n) => n.group === 'main');

  function NavBtn({ item }) {
    const active = screen === item.id;
    const [hov, setHov] = useAppState(false);
    return (
      <button onClick={() => onScreen(item.id)}
      onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}
      title={!expanded ? item.label : undefined}
      style={{ display: 'flex', alignItems: 'center', gap: 10, padding: expanded ? '8px 12px' : '9px 0', justifyContent: expanded ? 'flex-start' : 'center', width: '100%', border: 'none', cursor: 'pointer', borderRadius: 4, background: active ? 'var(--blue-dim)' : hov ? 'var(--surface-2)' : 'transparent', color: active ? 'var(--blue)' : hov ? 'var(--text)' : 'var(--text-2)', transition: 'all 0.15s', position: 'relative' }}>
        {active && <div style={{ position: 'absolute', left: 0, top: '20%', bottom: '20%', width: 2.5, background: 'var(--blue)' }} />}
        <Icon name={item.icon} size={17} color={active ? 'var(--blue)' : hov ? 'var(--text)' : 'var(--text-2)'} />
        {expanded && <span style={{ fontSize: 13, fontWeight: active ? 600 : 400 }}>{item.label}</span>}
      </button>);

  }

  return (
    <div style={{ width: expanded ? 'var(--sidebar-w)' : 56, flexShrink: 0, borderRight: '1px solid var(--border)', background: 'var(--surface)', display: 'flex', flexDirection: 'column', overflow: 'hidden', transition: 'width 0.22s ease' }}>
      {/* Header — click anywhere to collapse/expand */}
      <button onClick={onToggle}
      title={expanded ? 'Collapse sidebar' : 'Expand sidebar'}
      style={{ height: 44, padding: expanded ? '0 14px' : '0', display: 'flex', alignItems: 'center', gap: 10, justifyContent: expanded ? 'flex-start' : 'center', borderBottom: '1px solid var(--border)', flexShrink: 0, background: 'transparent', border: 'none', borderBottomWidth: 1, borderBottomStyle: 'solid', borderBottomColor: 'var(--border)', cursor: 'pointer', color: 'var(--text)', width: '100%', textAlign: 'left' }}>
        <div style={{ width: 28, height: 28, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
          <ForgeLogo size={26} />
        </div>
        {expanded &&
        <div style={{ flex: 1, minWidth: 0, display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 6 }}>
            <div style={{ lineHeight: 1.15 }}>
              <div style={{ fontSize: 13, fontWeight: 800, letterSpacing: '-0.02em' }}>Loom</div>
              <div style={{ fontSize: 9, color: 'var(--text-3)', fontFamily: 'var(--mono)', textTransform: 'uppercase', letterSpacing: '0.10em' }}>local AI</div>
            </div>
            <Icon name="chevron-left" size={13} color="var(--text-3)" />
          </div>
        }
      </button>
      <div style={{ flex: 1, overflowY: 'auto', padding: expanded ? '18px 10px 10px' : '18px 8px 10px', display: 'flex', flexDirection: 'column', gap: 2 }}>
        <button onClick={onPalette} style={{ display: 'flex', alignItems: 'center', gap: 8, padding: expanded ? '7px 12px' : '8px 0', justifyContent: expanded ? 'flex-start' : 'center', width: '100%', background: 'var(--surface-2)', border: '1px solid var(--border)', borderRadius: 4, cursor: 'pointer', color: 'var(--text-3)', marginBottom: 8, transition: 'all 0.15s' }}>
          <Icon name="search" size={15} color="var(--text-3)" />
          {expanded && <><span style={{ flex: 1, fontSize: 12, textAlign: 'left' }}>Search...</span><span style={{ fontSize: 10, padding: '1px 5px', background: 'var(--surface-3)', border: '1px solid var(--border-2)', borderRadius: 3, fontFamily: 'var(--mono)' }}>⌘K</span></>}
        </button>
        {main.map((item) => <NavBtn key={item.id} item={item} />)}
      </div>
      <div style={{ padding: expanded ? '12px 10px' : '12px 8px', borderTop: '1px solid var(--border)', display: 'flex', flexDirection: 'column', gap: 2 }}>
        {/* Theme toggle */}
        <button onClick={onToggleTheme}
        title={`Switch to ${theme === 'dark' ? 'light' : 'dark'} mode`}
        style={{ display: 'flex', alignItems: 'center', gap: 10, padding: expanded ? '6px 12px' : '7px 0', justifyContent: expanded ? 'flex-start' : 'center', width: '100%', border: 'none', borderRadius: 4, background: 'transparent', cursor: 'pointer', color: 'var(--text-2)', transition: 'all 0.15s' }}>
          {theme === 'dark' ?
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="4" /><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41" /></svg> :
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" /></svg>}
          {expanded && <span style={{ fontSize: 13 }}>{theme === 'dark' ? 'Light mode' : 'Dark mode'}</span>}
        </button>
        <button onClick={onOpenProfile} title="Edit profile"
          style={{ display: 'flex', alignItems: 'center', gap: 9, padding: expanded ? '6px 10px' : '4px 0', justifyContent: expanded ? 'flex-start' : 'center', marginTop: 2, background: 'transparent', border: 'none', borderRadius: 4, cursor: 'pointer', color: 'var(--text)', width: '100%', textAlign: 'left', transition: 'background 0.15s' }}
          onMouseEnter={(e) => e.currentTarget.style.background = 'var(--surface-2)'}
          onMouseLeave={(e) => e.currentTarget.style.background = 'transparent'}>
          <div style={{ width: 28, height: 28, borderRadius: 4, background: user?.color || 'var(--blue)', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0, fontSize: 12, color: user?.color === 'var(--text)' ? 'var(--bg)' : '#000', fontWeight: 800, fontFamily: 'var(--mono)' }}>{(user?.username?.[0] || 'U').toUpperCase()}</div>
          {expanded && <div style={{ minWidth: 0, flex: 1 }}><div style={{ fontSize: 12, fontWeight: 600, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{user?.username || 'user'}</div><div style={{ fontSize: 10, color: 'var(--text-3)', fontFamily: 'var(--mono)', textTransform: 'uppercase', letterSpacing: '0.06em' }}>localhost</div></div>}
        </button>
      </div>
    </div>);

}

function ForgeApp() {
  const [onboarding, setOnboarding] = useAppState(true);
  const [user, setUser] = useAppState(null);
  const [profileOpen, setProfileOpen] = useAppState(false);
  const [screen, setScreen] = useAppState('workspace');
  const [paletteOpen, setPaletteOpen] = useAppState(false);
  const [theme, setTheme] = useAppState('dark');
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const expanded = tweaks.sidebarExpanded !== false;

  useAppEffect(() => {
    const fn = (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === 'k') {e.preventDefault();setPaletteOpen((p) => !p);}
      if (e.key === 'Escape') setPaletteOpen(false);
    };
    window.addEventListener('keydown', fn);
    return () => window.removeEventListener('keydown', fn);
  }, []);

  // Expose navigation hook for cross-component navigation
  useAppEffect(() => {
    window.__forgeNavigate = setScreen;
    window.__forgeUseAgent = (name) => {window.__forgeNextAgent = name;};
    return () => {delete window.__forgeNavigate;delete window.__forgeUseAgent;};
  }, []);

  // Theme + accent applied via injected CSS
  useAppEffect(() => {
    const s = document.getElementById('fa-accent') || (() => {
      const el = document.createElement('style');el.id = 'fa-accent';
      document.head.appendChild(el);return el;
    })();
    const c = tweaks.accentColor || '#00b8d4';
    const r = parseInt(c.slice(1, 3), 16),g = parseInt(c.slice(3, 5), 16),b = parseInt(c.slice(5, 7), 16);

    const lightVars = theme === 'light' ? `
      --bg:#f5f5f5;
      --surface:#ffffff;
      --surface-2:#f0f0f0;
      --surface-3:#e6e6e6;
      --border:#e5e5e5;
      --border-2:#d4d4d4;
      --text:#0a0a0a;
      --text-2:#525252;
      --text-3:#a3a3a3;
    ` : '';

    s.textContent = `:root{${lightVars}--blue:${c};--blue-dim:rgba(${r},${g},${b},0.12);--blue-glow:rgba(${r},${g},${b},0.30);}`;
  }, [tweaks.accentColor, theme]);

  const SCREENS = {
    workspace: <WorkspaceScreen />,
    agents: <AgentManagerScreen />,
    workflow: <WorkflowBuilderScreen />,
    terminal: <TerminalScreen />,
    multiagent: <MultiAgentScreen />
  };

  if (onboarding) return <OnboardingScreen onComplete={(data) => { setUser(data); setOnboarding(false); }} />;

  return (
    <div style={{ display: 'flex', flexDirection: 'column', height: '100vh', overflow: 'hidden' }}>
      <div style={{ display: 'flex', flex: 1, overflow: 'hidden' }}>
        <AppSidebar
          screen={screen} onScreen={setScreen}
          onPalette={() => setPaletteOpen(true)}
          expanded={expanded} onToggle={() => setTweak('sidebarExpanded', !expanded)}
          theme={theme} onToggleTheme={() => setTheme((t) => t === 'dark' ? 'light' : 'dark')}
          user={user} onOpenProfile={() => setProfileOpen(true)} />
        <main style={{ flex: 1, overflow: 'hidden', position: 'relative' }} key={screen}>
          {SCREENS[screen] || <WorkspaceScreen />}
        </main>
      </div>
      {paletteOpen && <PaletteScreen onClose={() => setPaletteOpen(false)} onNavigate={(s) => {setScreen(s);setPaletteOpen(false);}} />}
      {profileOpen && <ProfileModal user={user} onSave={(data) => setUser({ ...user, ...data })} onClose={() => setProfileOpen(false)} />}
      <TweaksPanel>
        <TweakSection label="Accent" />
        <TweakColor label="Color" value={tweaks.accentColor} options={['#00b8d4', '#d9357a', '#00cc88', '#e6c128']} onChange={(v) => setTweak('accentColor', v)} />
        <TweakSection label="Theme" />
        <TweakRadio label="Mode" value={theme} options={[{ value: 'dark', label: 'Dark' }, { value: 'light', label: 'Light' }]} onChange={setTheme} />
        <TweakSection label="Sidebar" />
        <TweakToggle label="Show labels" value={expanded} onChange={(v) => setTweak('sidebarExpanded', v)} />
        <TweakSection label="Navigate" />
        <TweakSelect label="Screen" value={screen}
        options={[{ value: 'workspace', label: 'Chats' }, { value: 'agents', label: 'Agents' }, { value: 'workflow', label: 'Workflow' }, { value: 'terminal', label: 'Terminal' }, { value: 'multiagent', label: 'Multi-Agent' }]}
        onChange={(v) => setScreen(v)} />
      </TweaksPanel>
    </div>);

}

ReactDOM.createRoot(document.getElementById('root')).render(<ForgeApp />);
</script>
</body>
</html>
