name: Bug Fix
description: Report a bug that needs to be fixed
title: "fix: <short description of the bug>"
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the sections below.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      value: |
        **What happened:**
        [Describe the bug clearly and concisely.]

        **Where it happens:**
        [Component / page / endpoint / feature affected — e.g. "Agent creation form", "POST /api/conversations".]

        <!-- Example: When creating an agent with a name longer than 50 characters, the form submits successfully but the agent is silently truncated without any warning to the user. -->
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Minimum steps needed to reproduce the behavior.
      value: |
        1. Go to '...'
        2. Click / call / enter '...'
        3. Observe '...'

        **Reproducibility:** [ ] Always  [ ] Sometimes  [ ] Rarely
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
      value: |
        The application should [describe the correct behavior].

        <!-- Example: The application should display a validation error stating the name cannot exceed 50 characters before allowing form submission. -->
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened.
      value: |
        Instead, the application [describe what actually happens].

        <!-- Example: Instead, the application accepts the input silently and stores only the first 50 characters, with no feedback to the user. -->
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Relevant environment details.
      value: |
        - OS: [e.g. Ubuntu 22.04 / macOS 14 / Windows 11]
        - Java version: [e.g. 21]
        - Node version: [e.g. 20.x]
        - Browser: [e.g. Chrome 125 / Firefox 126 — if applicable]
        - App version / commit: [e.g. v1.2.0 or commit hash]
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs / Stack Trace
      description: Paste any relevant logs or error output.
      render: shell
      value: |
        # Paste logs here. Remove any sensitive data (tokens, passwords, personal info) before submitting.

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Any other context, screenshots, or information about the problem.
      value: |
        <!-- Add screenshots, screen recordings, or links to related issues. -->
        N/A

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues to avoid duplicates
          required: true
        - label: I can reproduce this bug consistently
          required: true
