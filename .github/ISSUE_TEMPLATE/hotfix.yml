name: Hotfix
description: Report a critical issue requiring immediate attention in production
title: "hotfix: <short description of the critical issue>"
labels: ["hotfix", "critical", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        > **This template is for critical production issues that require an urgent fix.**
        > For non-critical bugs, please use the [Bug Fix](?template=fix.yml) template instead.

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: How severe is this issue?
      options:
        - "P0 — Production is down"
        - "P1 — Major feature broken, no workaround"
        - "P2 — Major feature broken, workaround exists"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Issue Description
      description: A clear and concise description of the critical issue.
      value: |
        **What is broken:**
        [Describe the issue clearly. Be specific about what is failing and how it manifests.]

        **When it started:**
        [Approximate time / deploy / commit when the issue began — e.g. "After deploy at 14:30 UTC on 2026-06-10".]

        <!-- Example: After the 14:30 UTC deploy, all users attempting to log in receive a 500 Internal Server Error. The authentication service is failing to connect to the session store. -->
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: Who is affected and what is the business impact?
      value: |
        - **Affected users:** [e.g. All users / Authenticated users / Admin users / Users in region X]
        - **Affected functionality:** [e.g. Login, Conversation creation, Agent execution]
        - **Estimated blast radius:** [e.g. ~100% of active sessions / ~20 users]
        - **Business impact:** [e.g. Users cannot log in / Payments are failing / Data is being lost]
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Minimum steps to reproduce the issue in production or staging.
      value: |
        1. Go to '...'
        2. Perform '...'
        3. Observe '...'

        **Reproducibility:** [ ] 100%  [ ] Intermittent (~__% of the time)
    validations:
      required: true

  - type: textarea
    id: workaround
    attributes:
      label: Temporary Workaround
      description: Is there any temporary workaround available while the fix is being developed?
      value: |
        <!-- Choose one and describe: -->

        **No workaround available.** Users are fully blocked until this is resolved.

        <!-- OR -->

        <!-- **Workaround:** [Describe the temporary mitigation steps, e.g. "Users can clear cookies and log in again" or "Roll back to commit abc1234".] -->
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Stack Trace
      description: Paste relevant error logs, stack traces, or monitoring alerts.
      render: shell
      value: |
        # Paste logs here. Remove any sensitive data (tokens, passwords, personal info) before submitting.

  - type: textarea
    id: proposed-fix
    attributes:
      label: Proposed Fix (optional)
      description: If you already have a root cause hypothesis or know what needs to change, describe it here.
      value: |
        **Root cause hypothesis:**
        [e.g. The Redis connection pool is exhausted due to missing connection release in the session middleware.]

        **Proposed change:**
        [e.g. Add `finally` block in `SessionService.java` to ensure connections are always released.]

        **Risk of fix:**
        [ ] Low — isolated change with no side effects
        [ ] Medium — touches shared code, needs targeted testing
        [ ] High — broad change, requires full regression

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: This is a production issue requiring immediate attention
          required: true
        - label: I have checked there is no existing open hotfix for this issue
          required: true
        - label: I have notified the team through the appropriate channel
          required: false
